<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | TalentHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/api.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/components.js"></script>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-art">
      <a class="brand" href="index.html"><span class="brand-mark"><i class="fa-solid fa-briefcase"></i></span><span>TalentHub</span></a>
      <h1>Welcome back</h1>
      <p>Securely access your candidate, recruiter, or admin workspace.</p>
    </section>
    <section class="auth-card">
      <h1>Sign in</h1>
      <p class="muted">Use your TalentHub account to continue.</p>
      <form id="loginForm" novalidate>
        <div class="form-group"><label>Email</label><input class="input" name="email" type="email" required><div class="field-error"></div></div>
        <div class="form-group"><label>Password</label><input class="input" name="password" type="password" required><div class="field-error"></div></div>
        <div class="check-row"><label><input type="checkbox" name="remember"> Remember me</label><button type="button" class="btn btn-ghost" id="forgotPassword">Forgot password?</button></div>
        <button class="btn btn-primary btn-block" type="submit"><i class="fa-solid fa-right-to-bracket"></i>Login</button>
      </form>
      <p class="muted" style="margin-top:18px">New to TalentHub? <a href="register.html" style="color:var(--primary);font-weight:700">Create an account</a></p>
    </section>
  </main>
</body>
</html>
