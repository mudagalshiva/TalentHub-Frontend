<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | TalentHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/api.js"></script>
  <script defer src="js/auth.js"></script>
  <script defer src="js/components.js"></script>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-art">
      <a class="brand" href="index.html"><span class="brand-mark"><i class="fa-solid fa-briefcase"></i></span><span>TalentHub</span></a>
      <h1>Create your hiring identity</h1>
      <p>Candidates can apply and save jobs. Recruiters can publish openings and manage applications.</p>
    </section>
    <section class="auth-card">
      <h1>Join TalentHub</h1>
      <form id="registerForm" novalidate>
        <div class="tabs" style="margin-bottom:18px">
          <button type="button" class="tab active" onclick="document.querySelector('[name=role]').value='CANDIDATE';this.classList.add('active');this.nextElementSibling.classList.remove('active');document.getElementById('companyNameGroup').classList.add('hidden')">Candidate</button>
          <button type="button" class="tab" onclick="document.querySelector('[name=role]').value='RECRUITER';this.classList.add('active');this.previousElementSibling.classList.remove('active');document.getElementById('companyNameGroup').classList.remove('hidden')">Recruiter</button>
        </div>
        <input type="hidden" name="role" value="CANDIDATE">
        <div class="form-group"><label>Full name</label><input class="input" name="name" required><div class="field-error"></div></div>
        <div class="form-group hidden" id="companyNameGroup"><label>Company name</label><input class="input" name="companyName"></div>
        <div class="form-group"><label>Email</label><input class="input" name="email" type="email" required><div class="field-error"></div></div>
        <div class="form-row">
          <div class="form-group"><label>Password</label><input class="input" name="password" type="password" required><div class="field-error"></div></div>
          <div class="form-group"><label>Confirm password</label><input class="input" name="confirmPassword" type="password" required><div class="field-error"></div></div>
        </div>
        <button class="btn btn-primary btn-block" type="submit"><i class="fa-solid fa-user-plus"></i>Create account</button>
      </form>
      <p class="muted" style="margin-top:18px">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:700">Sign in</a></p>
    </section>
  </main>
</body>
</html>
